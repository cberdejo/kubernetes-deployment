{{- if not .Values.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-app.fullname" . }}-postgres-secret
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.secret.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.secret.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.secret.database | quote }}
  DATABASE_URI: {{ default (printf "postgres://%s:%s@%s:%v/%s" .Values.postgres.secret.username .Values.postgres.secret.password (include "todo-app.fullname" . | printf "%s-postgres") .Values.postgres.service.port .Values.postgres.secret.database) .Values.postgres.secret.databaseUri | quote }}
{{- end }}
