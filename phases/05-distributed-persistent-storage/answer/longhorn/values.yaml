longhorn:
  # Keep this aligned with the number of schedulable Longhorn storage nodes in
  # the lab. Raise it to 3 once the cluster has three storage nodes.
  persistence:
    defaultClassReplicaCount: 1
  defaultSettings:
    defaultReplicaCount: '{"v1":"1","v2":"1"}'
  preUpgradeChecker:
    jobEnabled: false
# enabled is false, this will be turned true in the next phases
gatewayRoute:
  enabled: false
  gateway:
    name: public-gateway
    namespace: envoy-gateway
  pathPrefix: /
