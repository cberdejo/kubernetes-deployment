longhorn:
  # Keep aligned with the number of Longhorn storage nodes in the cluster.
  # Raise to 3 once you have three storage nodes.
  persistence:
    defaultClassReplicaCount: 1
  defaultSettings:
    defaultReplicaCount: '{"v1":"1","v2":"1"}'
  preUpgradeChecker:
    jobEnabled: false

# Route is disabled in this phase — Envoy Gateway is not yet installed.
# Enable in a future phase when envoy-gateway is added.
gatewayRoute:
  enabled: false
  gateway:
    name: public-gateway
    namespace: envoy-gateway
  hostname: "longhorn.talos.local"
  pathPrefix: /
