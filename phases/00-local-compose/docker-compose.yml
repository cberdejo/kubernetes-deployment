services:
  postgres:
    image: postgres:15
    container_name: db-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chatdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ../../application/backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      DATABASE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BACKEND_HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-9090}:${BACKEND_PORT:-9090}"
  frontend:
    build:
      context: ../../application/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:${BACKEND_PORT}/api/v1"
    env_file:
      - ./.env
    depends_on:
      - backend
    ports:
      - "8080:80"
volumes:
  postgres_data:
