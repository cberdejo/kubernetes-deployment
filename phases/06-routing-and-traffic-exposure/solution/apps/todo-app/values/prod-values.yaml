global:
  imagePullSecrets: []

frontend:
  replicaCount: 1
  image:
    repository: "docker.io/your-dockerhub-user/todo-frontend"
    tag: "1.0.0"
  imagePullPolicy: IfNotPresent
  containerPort: 80
  service:
    type: ClusterIP
    port: 3000
    targetPort: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  config:
    viteApiUrl: "/api/v1"
    backendUpstream: ""
  gatewayRoute:
    enabled: true
    gateway:
      name: public-gateway
      namespace: envoy-gateway
    pathPrefix: /

backend:
  replicaCount: 1
  image:
    repository: "docker.io/your-dockerhub-user/todo-backend"
    tag: "1.0.0"
  imagePullPolicy: IfNotPresent
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  config:
    host: "0.0.0.0"
    port: "8080"
    # Defaults to <release-name>-todo-app-postgres via template when empty
    postgresHost: ""
    postgresPort: "5432"
  existingSecret: ""

postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: "15.10"
  imagePullPolicy: IfNotPresent
  containerPort: 5432
  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  secretName: "todo-db-secret"
  existingSecret: ""
  persistence:
    enabled: true
    size: 1Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: longhorn
