{{- if .Values.gatewayRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-ui
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayRoute.gateway.name }}
      namespace: {{ .Values.gatewayRoute.gateway.namespace }}
  {{- if .Values.gatewayRoute.hostname }}
  hostnames:
    - {{ .Values.gatewayRoute.hostname | quote }}
  {{- end }}
  rules:
    - backendRefs:
        - kind: Service
          # longhorn-frontend is the internal service name exposed by the Longhorn 1.x chart.
          # If the upstream chart renames it, update gatewayRoute.backendService in values.
          name: {{ .Values.gatewayRoute.backendService | default "longhorn-frontend" }}
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gatewayRoute.pathPrefix }}
{{- end }}